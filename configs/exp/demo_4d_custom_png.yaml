# @package _global_

defaults:
  - override /data: custom_png
  - override /model: diffuman4d
  - override /sampler: sliding_fast

data:
  scene_label: "test2"
  has_gt_target: True

model:
  torch_dtype: "bf16" # use "fp16" if "bf16" is not supported by your GPU
  gpu_ids: null # use all GPUs if null

sampler:
  spa_label_range: [0, 4, 1] # target cameras
  tem_label_range: [0, 85, 1] # target frames
  input_spa_labels: [0, 2, 3] # input cameras
  window_size: 1
  sliding_stride: 1

sampling: true
to_nerfstudio: true
evaluating: false
